<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Pressure Stage Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #475569);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 {
            text-align: center;
            color: #38bdf8;
            font-size: 2.5rem;
            margin-bottom: 30px;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(56, 189, 248, 0.3);
        }

        form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 400;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="number"] {
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(15, 23, 42, 0.6);
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .btn {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 15px;
        }

        input[type="submit"] {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
            padding: 16px 40px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            width: 100%;
            max-width: 300px;
        }

        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.6);
            background: linear-gradient(135deg, #38bdf8, #3b82f6);
        }

        input[type="submit"]:active {
            transform: translateY(1px);
        }

        /* Smooth fade-in animation for container */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Blood Pressure Predictor</h2>
        <form action="/predict" method="POST">
            <div class="input-group">
                <label>Gender:</label>
                <input type="text" name="Gender" required placeholder="e.g. Male or Female">
            </div>
            <div class="input-group">
                <label>Age:</label>
                <input type="number" name="Age" required placeholder="e.g. 45">
            </div>
            <div class="input-group">
                <label>History:</label>
                <input type="text" name="History" required placeholder="e.g. Yes/No">
            </div>
            <div class="input-group">
                <label>Patient:</label>
                <input type="text" name="Patient" required placeholder="e.g. Yes/No">
            </div>
            <div class="input-group">
                <label>Take Medication:</label>
                <input type="text" name="TakeMedication" required placeholder="e.g. Yes/No">
            </div>
            <div class="input-group">
                <label>Severity:</label>
                <input type="text" name="Severity" required placeholder="e.g. Severe">
            </div>
            <div class="input-group">
                <label>Breath Shortness:</label>
                <input type="text" name="BreathShortness" required placeholder="e.g. Yes/No">
            </div>
            <div class="input-group">
                <label>Visual Changes:</label>
                <input type="text" name="VisualChanges" required placeholder="e.g. Yes/No">
            </div>
            <div class="input-group">
                <label>Nose Bleeding:</label>
                <input type="text" name="NoseBleeding" required placeholder="e.g. Yes/No">
            </div>
            <div class="input-group">
                <label>When Diagnosed:</label>
                <input type="text" name="Whendiagnoused" required placeholder="e.g. 50">
            </div>
            <div class="input-group">
                <label>Systolic (mmHg):</label>
                <input type="number" name="Systolic" required placeholder="e.g. 120">
            </div>
            <div class="input-group">
                <label>Diastolic (mmHg):</label>
                <input type="number" name="Diastolic" required placeholder="e.g. 80">
            </div>
            <div class="input-group">
                <label>Controlled Diet:</label>
                <input type="text" name="ControlledDiet" required placeholder="e.g. Yes/No">
            </div>
            <div class="btn">
                <input type="submit" value="Predict Stage">
            </div>
        </form>
    </div>
</body>

</html>
